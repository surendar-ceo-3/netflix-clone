<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Netflix Clone - Surendar</title>
  <script>
    // Redirect to index.html for client-side routing
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/?/' + l.pathname.slice(1).split('/').join('/') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <h1>Loading Netflix Clone by Surendar...</h1>
</body>
</html>
